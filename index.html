<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sadha Sivam | Bio</title>
    <style>
        /* Modern Vibrant Background */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Card Container */
        .bio-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 3rem;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transform: translateY(50px);
            opacity: 0;
            animation: slideUp 1s ease forwards;
            max-width: 600px;
            width: 90%;
        }

        @keyframes slideUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 4px 10px rgba(0,0,0,0.2);
        }

        .role {
            font-size: 1.5rem;
            font-weight: 300;
            background: #fff;
            color: #e73c7e;
            display: inline-block;
            padding: 5px 20px;
            border-radius: 50px;
            margin-bottom: 20px;
        }

        .detail-box {
            margin-top: 20px;
            font-size: 1.2rem;
            line-height: 1.6;
        }

        .highlight {
            color: #ffd700;
            font-weight: bold;
            display: block;
            font-size: 1.8rem;
            margin-top: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Floating Animation for Bike Section */
        .bike-tag {
            margin-top: 30px;
            border-top: 1px solid rgba(255,255,255,0.3);
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <div class="bio-card">
        <h1>Sadha Sivam . M</h1>
        <img src="images/sadhasivam.jpg" width="200" height="300" alt="sadha">
        <div class="role">Sports Player 🏆</div>
        
        <div class="detail-box">
            <p>Pushing limits on and off the field.</p>
            <div class="bike-tag">
                <p>Driven by the legendary rhythm of the</p>
                <span class="highlight">Yamaha RX100 🏍️</span>
            </div>
        </div>
    </div>
</body>
</html>
